services:
  mongo:
    image: mongo:7
    container_name: iso-manager-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: iso-manager-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/iso_manager}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://iso.servasmar.cl}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:-}
      CLERK_API_URL: ${CLERK_API_URL:-https://api.clerk.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-${GOOGLE_CALENDAR_CLIENT_ID:-}}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-${GOOGLE_CALENDAR_CLIENT_SECRET:-}}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-${GOOGLE_CALENDAR_REFRESH_TOKEN:-}}
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-${GOOGLE_CLIENT_ID:-}}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-${GOOGLE_CLIENT_SECRET:-}}
      GOOGLE_CALENDAR_REFRESH_TOKEN: ${GOOGLE_CALENDAR_REFRESH_TOKEN:-${GOOGLE_REFRESH_TOKEN:-}}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
